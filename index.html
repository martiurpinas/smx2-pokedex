<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Regional - Johto Map</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>

    <main class="app-container">
        <header class="pokedex-header">
            <div class="header-content">
                <h1>Pokedex</h1>
            </div>
        </header>

        <section class="interface-sidebar">
            
            <article class="pokedex-visual">
                <div class="pokedex-crop">
                    <img src="./images/pokedex.png" alt="Dispositivo Pokédex" class="pokedex-img">
                </div>
            </article>

            <nav class="pokemon-nav">
                <ul class="pokemon-list">
                    <li class="pokemon-item"><span class="marker"></span>cindaquil</li>
                    <li class="pokemon-item"><span class="marker"></span>gengar</li>
                    <li class="pokemon-item"><span class="marker"></span>mew</li>
                    <li class="pokemon-item"><span class="marker"></span>rayquaza</li>
                </ul>
            </nav>

        </section>
    </main>

</body>
</html>
