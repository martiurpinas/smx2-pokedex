<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="pokedex">
        <h1>Pokédex</h1>
        
        <img src="./images/kanto-map.jpeg" alt="Mapa de Kanto" class="kanto-map">
        
        <div class="pokemon-row">
            <div class="pokemon">
                <div class="pokemon-sprite"></div>
                <span>cindaquill</span>
            </div>
            <div class="pokemon">
                <div class="pokemon-sprite"></div>
                <span>engar</span>
            </div>
            <div class="pokemon">
                <div class="pokemon-sprite"></div>
                <span>mew</span>
            </div>
            <div class="pokemon">
                <div class="pokemon-sprite"></div>
                <span>rayquaza</span>
            </div>
        </div>
    </div>
</body>
</html>
