<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title">Pokédex</h1>
        
        <img src="./images/kanto-map.png" alt="Mapa de Kanto" class="kanto-map">
        
        <div class="pokemon-list">
            <div class="pokemon-card">
                <img src="./images/cindaquill.png" alt="cindaquill">
                <span class="pokemon-name">cindaquill</span>
            </div>
            
            <div class="pokemon-card">
                <img src="" alt="engar">
                <span class="pokemon-name">engar</span>
            </div>
            
            <div class="pokemon-card">
                <img src="" alt="mew">
                <span class="pokemon-name">mew</span>
            </div>
            
            <div class="pokemon-card">
                <img src="" alt="rayquaza">
                <span class="pokemon-name">rayquaza</span>
            </div>
        </div>
    </div>
</body>
</html>
