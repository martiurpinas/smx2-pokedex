<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="pokedex">
        <h1>Pokédex</h1>
        
        <div class="map-container">
            <img src="./images/kanto-map.jpeg" alt="Mapa de Kanto" class="kanto-map">
        </div>
        
        <div class="pokemon-list">
            <div class="pokemon-item">
                <div class="pokemon-image"></div>
                <span class="pokemon-name">cindaquill</span>
            </div>
            <div class="pokemon-item">
                <div class="pokemon-image"></div>
                <span class="pokemon-name">engar</span>
            </div>
            <div class="pokemon-item">
                <div class="pokemon-image"></div>
                <span class="pokemon-name">mew</span>
            </div>
            <div class="pokemon-item">
                <div class="pokemon-image"></div>
                <span class="pokemon-name">rayquaza</span>
            </div>
        </div>
    </div>
</body>
</html>
